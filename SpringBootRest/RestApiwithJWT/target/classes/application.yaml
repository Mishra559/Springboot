spring:
  application:
    name: RestApiwithJWT
  main:
    banner-mode: off
    allow-circular-references: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/test2
    username: root
    password: root
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect


server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG