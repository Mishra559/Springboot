<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registration Page</title>
</head>
<body>
<font color="red"> <p th:text="${message}"></p></font>
<h2>Registration Form</h2>
<form th:action = "@{/save}" method = "post"  th:object="${user}">
    Name : <input type="text" th:field="*{userName}" /><br><br>
    Email : <input type="email" th:field="*{email}" /><br><br>
    Password : <input type="password" th:field="*{password}" /><br><br>
    <button type="submit">Register</button>
</form>
</body>
</html>
